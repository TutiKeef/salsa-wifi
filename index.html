<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salsa 🍕🔥</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, #ff3c00, #ff7300);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 100, 0, 0.5);
    }

    .hidden {
      display: none;
    }
    .pizza {
  width: 120px;
  height: 120px;
  margin: 20px auto;
  border-radius: 50%;
  background: radial-gradient(circle at center, #ffcc66 60%, #cc6600 61%);
  position: relative;
  animation: girar 6s linear infinite;
  box-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
}

.pizza::before {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: #cc0000;
  border-radius: 50%;
  top: 20px;
  left: 30px;
  box-shadow:
    40px 10px #cc0000,
    20px 50px #cc0000,
    60px 60px #cc0000,
    10px 70px #cc0000;
}

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
    
  </style>
</head>

<body>

<div class="container">

  <div id="inicio">
    <h1>Bem-vindo ao Salsa 🍕🔥</h1>
    <p>Cadastre-se para liberar o Wi-Fi e acessar o cardápio</p>
    <button onclick="mostrarFormulario()">Cadastrar</button>
  </div>

  <div id="formulario" class="hidden">
    <h1>Cadastro</h1>

    <input type="text" id="nome" placeholder="Seu nome" required>
    <input type="tel" id="whatsapp" placeholder="Seu WhatsApp" required>

    <button onclick="enviar()">Liberar acesso</button>

    <p id="loading" class="hidden">Enviando...</p>
    <p id="erro" class="hidden" style="color:red;">Erro ao enviar</p>
  </div>

  <div id="sucesso" class="hidden">
    <h1>Acesso liberado 🎉</h1>

    <p><strong>Wi-Fi:</strong> Salsa_WiFi</p>
    <p><strong>Senha:</strong> salsa123</p>

    <br>

    <a href="https://salsabazar.my.canva.site/menu" target="_blank">
      <button>Ver Cardápio</button>
    </a>

    <br><br>

    <a href="https://www.instagram.com/salsapizzabar/" target="_blank">
      <button>Instagram 🔥</button>
    </a>
  </div>

</div>

<script>
function mostrarFormulario() {
  document.getElementById("inicio").classList.add("hidden");
  document.getElementById("formulario").classList.remove("hidden");
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let whatsapp = document.getElementById("whatsapp").value;

  if (!nome || !whatsapp) {
    alert("Preencha tudo");
    return;
  }

  document.getElementById("loading").classList.remove("hidden");

  fetch("https://formspree.io/f/xykllglo", {
    method: "POST",
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ nome, whatsapp })
  })
  .then(res => {
    document.getElementById("formulario").classList.add("hidden");
    document.getElementById("sucesso").classList.remove("hidden");
  })
  .catch(() => {
    document.getElementById("erro").classList.remove("hidden");
  })
  .finally(() => {
    document.getElementById("loading").classList.add("hidden");
  });
}
</script>

</body>
</html>
